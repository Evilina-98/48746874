<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="windows-1251">
    <title>О школе</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f8ff;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        img {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        h2 {
            color: #2c5aa0;
            text-align: center;
        }
        p {
            line-height: 1.6;
            text-align: justify;
        }
        .back-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Наша школа</h2>
        <img src="images/school.png" alt="Школьное здание">
        <p>Мы - современная школа с инновационными методами обучения. Наша миссия - раскрыть потенциал каждого ученика!</p>
        <p>Основана в 1995 году. Более 1000 учеников. 50 квалифицированных педагогов.</p>
        <a href="index.html" class="back-btn">На главную</a>
    </div>
</body>
</html>
