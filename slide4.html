<!DOCTYPE html>
<html lang="ru">
<head><meta charset="UTF-8">
    <meta charset="windows-1251">
    <title>횎챨처챈챗챔 챔 챰책챗철챔챔</title>
    <style>
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-color: #fff9c4;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #7B1FA2;
            text-align: center;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }
        .clubs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 30px auto;
        }
        .club-card {
            background: white;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            transition: transform 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border: 2px solid #9C27B0;
        }
        .club-card:hover {
            transform: translateY(-10px);
        }
        .club-img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
            background: #eee;
        }
        h3 {
            margin: 10px 0;
            color: #4A148C;
        }
        p {
            color: #666;
            font-size: 14px;
        }
        .back-btn {
            display: block;
            width: fit-content;
            margin: 30px auto 0;
            padding: 10px 25px;
            background: #9C27B0;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>횒횪첩챔 챗챨처챈챗챔 챔 챰챦챤챨챵챔창챠청책 챰책챗철챔챔</h1>

    <div class="clubs-grid">
        <!-- 횗책챗철챔첼 1 -->
        <div class="club-card">
            <img src="images/art.jpg" alt="횊챌챤챰챵처채챔첼" class="club-img">
            <h3>횊챌챤챰챵처채챔첼</h3>
            <p>횂챵, 횞챵 - 16:00</p>
        </div>

        <!-- 횗책챗철챔첼 2 -->
        <div class="club-card">
            <img src="images/gym.jpg" alt="횄챔챙챠횪챰챵챔챗횪" class="club-img">
            <h3>횜챔챨챗챤창횪첼 챰챵처채챔첼</h3>
            <p>횗챨 - 17:00</p>
        </div>

        <!-- 횗책챗철챔첼 3 -->
        <div class="club-card">
            <img src="images/ball.jpg" alt="횚처챵찼챤챘" class="club-img">
            <h3>횚처챵찼챤챘</h3>
            <p>횕챠, 횕챵 - 18:00</p>
        </div>

        <!-- 횗책챗철챔첼 4 -->
        <div class="club-card">
            <img src="images/chess.jpg" alt="횠횪천챙횪챵청" class="club-img">
            <h3>횠횪천챙횪챵챠청챕 챗챘처찼</h3>
            <p>횕챠, 횗챨 - 15:30</p>
        </div>

        <!-- 횗책챗철챔첼 5 -->
        <div class="club-card">
            <img src="images/dance.jpg" alt="횘횪챠철청" class="club-img">
            <h3>횗챤창챨책챙책챠챠청책 챵횪챠철청</h3>
            <p>횂챵, 횕챵 - 17:30</p>
        </div>

        <!-- 횗책챗철챔첼 6 -->
        <div class="club-card">
            <img src="images/robot.jpg" alt="횖챤찼챤챵챤챵책천챠챔챗횪" class="club-img">
            <h3>횖챤찼챤챵챤챵책천챠챔챗횪</h3>
            <p>횞챵 - 16:30</p>
        </div>
    </div>

    <a href="index.html" class="back-btn">횒횪 찾챘횪창챠처첸</a>

</body>
</html>
