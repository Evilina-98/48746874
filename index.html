<!DOCTYPE html>
<html lang="ru">
<head><meta charset="UTF-8">
    <meta charset="windows-1251">
    <title>횠챗챤챘횪 찼처채처첫책찾챤</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            text-align: center;
            min-height: 100vh;
        }
        /* 횗챵챔챘챔 채챘첼 챘챤찾챤챵챔챦횪 */
        .logo {
            width: 150px; /* 횠챔챨챔챠횪 챘챤찾챤챵챔챦횪 */
            height: auto;
            margin: 10px auto;
            display: block;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            max-width: 800px;
            margin: 40px auto;
        }
        .nav-button {
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 15px;
            text-decoration: none;
            color: #333;
            font-size: 18px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 80px;
        }
        .nav-button:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            background: #fff;
            color: #667eea;
        }
        h1 {
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            margin-top: 10px;
        }
        @media (max-width: 768px) {
            .nav-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 480px) {
            .nav-grid {
                grid-template-columns: 1fr;
            }
            h1 {
                font-size: 24px;
            }
            .logo {
                width: 100px;
            }
        }
    </style>
</head>
<body>
    <!-- 횕처챵체 챗 챗횪챨챵챔챠챗책 챘챤찾챤챵챔챦횪 -->
    <img src="images/logo.png" alt="횏챤찾챤챵챔챦 첩챗챤챘청" class="logo">
    
    <h1>횠챗챤챘횪 횁처채처첫책찾챤</h1>

    <div class="nav-grid">
        <a href="slide1.html" class="nav-button">횓 첩챗챤챘책</a>
        <a href="slide2.html" class="nav-button">횙첨챔챵책챘첼</a>
        <a href="slide3.html" class="nav-button">횖횪챰챦챔챰횪챠챔책</a>
        <a href="slide4.html" class="nav-button">횎챨처챈챗챔</a>
        <a href="slide5.html" class="nav-button">횑책챨챤챦챨챔첼챵챔첼</a>
        <a href="slide6.html" class="nav-button">횄횪챘책챨책첼</a>
        <a href="slide7.html" class="nav-button">횒챤창챤챰챵챔</a>
        <a href="slide8.html" class="nav-button">횎챤챠챵횪챗챵청</a>
        <a href="slide9.html" class="nav-button">횆챤챰챵챔챈책챠챔첼</a>
    </div>
</body>
</html>
